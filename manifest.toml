#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "cloudreve"
name = "Cloudreve"
description.en = "Self-hosted file management and sharing system, supports multiple storage providers"
description.fr = "Système de gestion et de partage de fichiers auto-hébergé, prenant en charge plusieurs fournisseurs de stockage"

version = "4.10.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-3.0"
website = "https://cloudreve.org/"
demo = "https://demo.cloudreve.org/session"
admindoc = "https://docs.cloudreve.org/en/"
code = "https://github.com/cloudreve/Cloudreve"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    amd64.url = "https://github.com/cloudreve/cloudreve/releases/download/4.10.1/cloudreve_4.10.1_linux_amd64.tar.gz"
    amd64.sha256 = "b4d660fa8720afae6fc819110d08725f40e62d0b8ed09c1b5d4cd378be214807"
    arm64.url = "https://github.com/cloudreve/cloudreve/releases/download/4.10.1/cloudreve_4.10.1_linux_arm64.tar.gz"
    arm64.sha256 = "a01a8a3c2a0cce8761268ea5fe05cf320ab65c8f35383d17304a607540eedde1"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = ".*_linux_amd64.tar.gz"
    autoupdate.asset.arm64 = ".*_linux_rm64.tar.gz"

    [resources.system_user]

    [resources.install_dir]

    #[resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "mariadb-server, redis-server"

    [resources.database]
    type = "mysql"
